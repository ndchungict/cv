<section id="skills" class="main-section">
  <h2 class="main-section-title" data-i18n="sections.skills_title">
    <span class="section-icon" aria-hidden="true">🛠️</span>
    Kỹ Năng
  </h2>

  <div id="skills-list">
    {% assign lang = site.active_lang | default: "vi" %}
    {% for skill in site.data.skills[lang] %}
    <div class="skill-category">
      <h3 class="category-name">{{ skill.category }}</h3>
      <p class="skill-description">{{ skill.description }}</p>
    </div>
    {% endfor %}
  </div>
</section>
