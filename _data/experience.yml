vi:
  - title: "Automation Test Engineer"
    company: "Ngân hàng thương mại cổ phần Tiên Phong (TPBank)"
    start: "09/2022"
    end: "Hiện tại"
    responsibilities:
      - "Thiết kế và xây dựng framework kiểm thử tự động từ đầu cho các hệ thống FCC, SmartVista, SaleApp, sử dụng Katalon, Appium và Playwright."
      - "Lập kế hoạch kiểm thử tổng thể cho từng sprint và release, phân bổ nguồn lực, review testcase và test script để đảm bảo chất lượng trước khi triển khai."
      - "Tích hợp bộ kiểm thử tự động vào pipeline CI (Jenkins)."
      - "Nghiên cứu và triển khai ứng dụng AI (LLM, AI-assisted test generation) vào quy trình kiểm thử tự động, nâng cao hiệu quả sinh test script và phân tích kết quả."
      - "Dẫn dắt và đào tạo nhóm, xây dựng quy trình chuẩn hóa và nâng cao năng lực kỹ thuật cho toàn team."
      - "Tư vấn kỹ thuật cho các nhóm phát triển về chiến lược kiểm thử, phân tích rủi ro và cải tiến chất lượng sản phẩm."

  - title: "Automation Test Mentor"
    company: "Ngân hàng thương mại cổ phần Quân đội (MBBank)"
    start: "02/2020"
    end: "09/2022"
    responsibilities:
      - "Xây dựng và chuẩn hóa framework kiểm thử tự động cho hệ thống Internet Banking và Mobile Banking, áp dụng BDD với SerenityBDD và Appium."
      - "Lập kế hoạch kiểm thử, phân bổ nguồn lực và theo dõi tiến độ kiểm thử theo từng giai đoạn phát triển sản phẩm."
      - "Review testcase và test script, đảm bảo độ bao phủ (test coverage) đạt yêu cầu trước mỗi lần release."
      - "Quản lý và báo cáo lỗi thông qua Jira, phối hợp chặt chẽ với nhóm phát triển để xử lý và xác nhận fix bug kịp thời."
      - "Mentoring trực tiếp cho 5–7 thành viên mới, hướng dẫn kỹ thuật viết script tự động và quy trình làm việc."
      - "Tư vấn kỹ thuật và đề xuất cải tiến quy trình kiểm thử, góp phần giảm tỷ lệ lỗi phát sinh trên môi trường production."

  - title: "Tester (Automation & Manual)"
    company: "Công ty TNHH MB Shinsei Finance (Mcredit)"
    start: "2018"
    end: "2020"
    responsibilities:
      - "Phân tích tài liệu yêu cầu và tài liệu thiết kế hệ thống, phối hợp với BA và nhóm phát triển để làm rõ yêu cầu nghiệp vụ trước khi thiết kế testcase."
      - "Thực hiện kiểm thử thủ công (functional, regression, UAT) cho các hệ thống quản lý khoản vay và ứng dụng khách hàng."
      - "Nghiên cứu và bắt đầu áp dụng kiểm thử tự động với Selenium WebDriver, xây dựng bộ script tự động hóa cho các luồng nghiệp vụ quan trọng."
      - "Hỗ trợ hướng dẫn khách hàng và người dùng cuối trong quá trình UAT, ghi nhận phản hồi và phối hợp xử lý các vấn đề phát sinh."
      - "Tham gia viết tài liệu kiểm thử, báo cáo kết quả kiểm thử và theo dõi vòng đời lỗi trên hệ thống quản lý."

  - title: "Nhân viên IT"
    company: "Công ty TNHH Thương mại VHC"
    start: "10/2013"
    end: "09/2018"
    responsibilities:
      - "Hỗ trợ kỹ thuật cho khách hàng trong việc cài đặt, cấu hình và sử dụng các thiết bị và phần mềm công nghệ."
      - "Tư vấn, giới thiệu sản phẩm và giải đáp thắc mắc kỹ thuật cho khách hàng, đảm bảo sự hài lòng sau bán hàng."
      - "Kiểm tra, bảo trì và khắc phục sự cố hệ thống mạng, máy tính và thiết bị ngoại vi (máy in, router, switch)."
      - "Ghi nhận và theo dõi các yêu cầu hỗ trợ kỹ thuật, phối hợp với nhóm kỹ thuật để xử lý kịp thời."

en:
  - title: "Automation Test Engineer"
    company: "Tien Phong Commercial Joint Stock Bank (TPBank)"
    start: "09/2022"
    end: "Present"
    responsibilities:
      - "Designed and built an automation test framework from scratch for FCC, SmartVista, and SaleApp systems using Katalon, Appium, and Playwright."
      - "Planned overall test strategies for each sprint and release, allocated resources, and reviewed test cases and scripts to ensure quality before deployment."
      - "Integrated the automation test suite into the CI pipeline (Jenkins)."
      - "Researched and implemented AI applications (LLM, AI-assisted test generation) into the automation testing process, enhancing test script generation efficiency and result analysis."
      - "Led and trained the team, established standardized processes, and enhanced technical capabilities across the team."
      - "Provided technical consulting to development teams on test strategy, risk analysis, and product quality improvement."

  - title: "Automation Test Mentor"
    company: "Military Commercial Joint Stock Bank (MBBank)"
    start: "02/2020"
    end: "09/2022"
    responsibilities:
      - "Built and standardized an automation test framework for Internet Banking and Mobile Banking systems using BDD with SerenityBDD and Appium."
      - "Planned test schedules, allocated resources, and tracked testing progress across each product development phase."
      - "Reviewed test cases and scripts to ensure test coverage met requirements before each release."
      - "Managed and reported bugs via Jira, collaborating closely with the development team to resolve and verify bug fixes in a timely manner."
      - "Directly mentored 5–7 new team members on automation script writing techniques and workflows."
      - "Provided technical consulting and proposed process improvements, contributing to a reduction in production defect rates."

  - title: "Tester (Automation & Manual)"
    company: "MB Shinsei Finance Co., Ltd. (Mcredit)"
    start: "2018"
    end: "2020"
    responsibilities:
      - "Analyzed requirements and system design documents, collaborating with BAs and developers to clarify business requirements before designing test cases."
      - "Performed manual testing (functional, regression, UAT) for loan management systems and customer-facing applications."
      - "Researched and began applying automation testing with Selenium WebDriver, building automated scripts for critical business flows."
      - "Supported customers and end users during UAT, gathered feedback, and coordinated resolution of issues."
      - "Participated in writing test documentation, test result reports, and tracking bug lifecycles in the management system."

  - title: "IT Staff"
    company: "VHC Trading Co., Ltd."
    start: "10/2013"
    end: "09/2018"
    responsibilities:
      - "Provided technical support to customers for installing, configuring, and using technology devices and software."
      - "Consulted on and introduced products, answered technical inquiries, and ensured post-sale customer satisfaction."
      - "Inspected, maintained, and troubleshot network systems, computers, and peripherals (printers, routers, switches)."
      - "Recorded and tracked technical support requests, coordinating with the technical team for timely resolution."

zh:
  - title: "自动化测试工程师"
    company: "先锋商业股份银行 (TPBank)"
    start: "09/2022"
    end: "至今"
    responsibilities:
      - "从零开始为FCC、SmartVista、SaleApp系统设计并构建自动化测试框架，使用Katalon、Appium和Playwright。"
      - "为每个sprint和版本制定整体测试计划，分配资源，审查测试用例和脚本，确保部署前的质量。"
      - "将自动化测试套件集成到CI流水线（Jenkins）。"
      - "研究并将AI应用（LLM、AI辅助测试生成）引入自动化测试流程，提升测试脚本生成效率和结果分析能力。"
      - "带领并培训团队，建立标准化流程，提升全团队技术能力。"
      - "为开发团队提供测试策略、风险分析和产品质量改进方面的技术咨询。"

  - title: "自动化测试导师"
    company: "军事商业股份银行 (MBBank)"
    start: "02/2020"
    end: "09/2022"
    responsibilities:
      - "使用SerenityBDD和Appium的BDD方法，为网银和手机银行系统构建并标准化自动化测试框架。"
      - "制定测试计划，分配资源，并跟踪各产品开发阶段的测试进度。"
      - "审查测试用例和脚本，确保每次发布前测试覆盖率达到要求。"
      - "通过Jira管理和报告缺陷，与开发团队紧密协作，及时处理和确认修复。"
      - "直接指导5–7名新成员，传授自动化脚本编写技术和工作流程。"
      - "提供技术咨询并提出流程改进建议，助力降低生产环境缺陷率。"

  - title: "测试工程师（自动化与手动）"
    company: "MB Shinsei Finance有限公司 (Mcredit)"
    start: "2018"
    end: "2020"
    responsibilities:
      - "分析需求和系统设计文档，与BA和开发人员协作，在设计测试用例前明确业务需求。"
      - "对贷款管理系统和客户端应用执行手动测试（功能、回归、UAT）。"
      - "研究并开始使用Selenium WebDriver进行自动化测试，为关键业务流程构建自动化脚本。"
      - "在UAT过程中支持客户和最终用户，收集反馈并协调解决问题。"
      - "参与编写测试文档、测试结果报告，并在管理系统中跟踪缺陷生命周期。"

  - title: "IT员工"
    company: "VHC贸易有限公司"
    start: "10/2013"
    end: "09/2018"
    responsibilities:
      - "为客户提供技术支持，协助安装、配置和使用技术设备及软件。"
      - "咨询和介绍产品，解答技术疑问，确保售后客户满意度。"
      - "检查、维护和排查网络系统、计算机及外围设备（打印机、路由器、交换机）故障。"
      - "记录和跟踪技术支持请求，与技术团队协调及时处理。"
